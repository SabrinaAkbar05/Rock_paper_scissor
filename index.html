<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rock, Paper, Scissors</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Semi+Condensed:wght@600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --scissors-grad-1: hsl(39, 89%, 49%);
      --scissors-grad-2: hsl(28, 76%, 44%);
      --paper-grad-1: hsl(230, 89%, 62%);
      --paper-grad-2: hsl(229, 64%, 46%);
      --rock-grad-1: hsl(349, 71%, 52%);
      --rock-grad-2: hsl(347, 75%, 35%);
      --lizard-grad-1: hsl(261, 73%, 60%);
      --lizard-grad-2: hsl(261, 51%, 44%);
      --spock-grad-1: hsl(189, 59%, 53%);
      --spock-grad-2: hsl(194, 58%, 42%);
      --dark-text: hsl(229, 25%, 31%);
      --score-text: hsl(229, 64%, 46%);
      --header-outline: hsl(246, 11%, 37%);
      --bg-grad-1: hsl(214, 47%, 23%);
      --bg-grad-2: hsl(237, 48%, 15%);
    }

    html, body {
      min-height: 100%;
      font-family: 'Barlow Semi Condensed', sans-serif;
    }

    body {
      background: radial-gradient(circle at 50% 0%, var(--bg-grad-1), var(--bg-grad-2));
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1.5rem;
      position: relative;
      overflow-x: hidden;
    }

    /* ─── HEADER ─── */
    .header {
      width: 100%;
      max-width: 700px;
      border: 3px solid var(--header-outline);
      border-radius: 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1rem 1.25rem;
      margin-bottom: 2.5rem;
    }

    .logo {
      display: flex;
      flex-direction: column;
      line-height: 1.1;
    }

    .logo span {
      color: white;
      font-weight: 700;
      font-size: clamp(1rem, 2.5vw, 1.5rem);
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    .score-box {
      background: white;
      border-radius: 8px;
      padding: 0.5rem 2rem;
      text-align: center;
      min-width: 110px;
    }

    .score-label {
      color: var(--score-text);
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    .score-value {
      color: var(--dark-text);
      font-size: clamp(2.5rem, 6vw, 3.5rem);
      font-weight: 700;
      line-height: 1;
      transition: all 0.2s;
    }

    /* ─── GAME AREA ─── */
    .game-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      width: 100%;
      max-width: 700px;
    }

    /* ─── CHOICE SCREEN ─── */
    .choice-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* Triangle layout */
    .triangle-layout {
      position: relative;
      width: 340px;
      height: 300px;
    }

    .triangle-layout .bg-shape {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -45%);
      width: 220px;
      opacity: 0.3;
    }

    .triangle-layout .choice-btn {
      position: absolute;
    }
    .triangle-layout .choice-btn:nth-child(2) { top: 0; left: 50%; transform: translateX(-50%); } /* scissors - top center in bonus */
    .triangle-layout .choice-btn:nth-child(3) { top: 0; left: 50%; transform: translateX(-50%); } /* paper  - top left */

    /* For standard RPS: paper top-left, scissors top-right, rock bottom-center */
    .triangle-rps .choice-btn:nth-child(2) { top: 0; left: 0; }         /* paper */
    .triangle-rps .choice-btn:nth-child(3) { top: 0; right: 0; }        /* scissors */
    .triangle-rps .choice-btn:nth-child(4) { bottom: 0; left: 50%; transform: translateX(-50%); } /* rock */

    /* Pentagon layout for RPSLS */
    .pentagon-layout {
      position: relative;
      width: 360px;
      height: 340px;
    }

    .pentagon-layout .bg-shape {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -48%);
      width: 260px;
      opacity: 0.3;
    }

    /* Pentagon positions (5 buttons in a circle) */
    /* scissors=top, spock=upper-left, lizard=lower-left, rock=lower-right, paper=upper-right */
    .pentagon-layout .choice-btn:nth-child(2) { top: 0; left: 50%; transform: translateX(-50%); }          /* scissors */
    .pentagon-layout .choice-btn:nth-child(3) { top: 25%; left: 0; }                                        /* spock */
    .pentagon-layout .choice-btn:nth-child(4) { bottom: 0; left: 12%; }                                     /* lizard */
    .pentagon-layout .choice-btn:nth-child(5) { bottom: 0; right: 12%; }                                    /* rock */
    .pentagon-layout .choice-btn:nth-child(6) { top: 25%; right: 0; }                                       /* paper */

    /* ─── CHOICE BUTTON ─── */
    .choice-btn {
      border: none;
      background: none;
      cursor: pointer;
      padding: 0;
      border-radius: 50%;
      transition: transform 0.15s ease, filter 0.15s ease;
      display: block;
    }

    .choice-btn:hover { transform: scale(1.08) !important; filter: brightness(1.1); }
    .choice-btn:focus-visible { outline: 4px solid white; outline-offset: 4px; }

    .choice-circle {
      width: 130px;
      height: 130px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      box-shadow: 0 6px 0 rgba(0,0,0,0.35);
    }

    /* Color variants */
    .choice-circle.scissors { background: linear-gradient(to bottom, var(--scissors-grad-1), var(--scissors-grad-2)); }
    .choice-circle.paper    { background: linear-gradient(to bottom, var(--paper-grad-1), var(--paper-grad-2)); }
    .choice-circle.rock     { background: linear-gradient(to bottom, var(--rock-grad-1), var(--rock-grad-2)); }
    .choice-circle.lizard   { background: linear-gradient(to bottom, var(--lizard-grad-1), var(--lizard-grad-2)); }
    .choice-circle.spock    { background: linear-gradient(to bottom, var(--spock-grad-1), var(--spock-grad-2)); }

    .choice-inner {
      width: 96px;
      height: 96px;
      border-radius: 50%;
      background: linear-gradient(to bottom, #e5e7f2, #d8dae8);
      box-shadow: inset 0 4px 0 rgba(0,0,0,0.2);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .choice-inner img,
    .choice-inner svg {
      width: 48px;
      height: 48px;
    }

    /* ─── RESULT SCREEN ─── */
    .result-screen {
      display: none;
      flex-direction: column;
      align-items: center;
      width: 100%;
    }

    .result-screen.active { display: flex; }

    .picks-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 4rem;
      width: 100%;
      margin-bottom: 3rem;
    }

    .pick-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.5rem;
    }

    .pick-label {
      color: white;
      font-weight: 600;
      letter-spacing: 2px;
      text-transform: uppercase;
      font-size: 0.85rem;
      order: -1;
    }

    /* Winner glow ring */
    .pick-circle-wrap {
      position: relative;
    }

    .pick-circle-wrap.winner::before,
    .pick-circle-wrap.winner::after {
      content: '';
      position: absolute;
      border-radius: 50%;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
      animation: winPulse 1.5s ease-out 0.3s both;
    }

    .pick-circle-wrap.winner::before {
      width: 260px;
      height: 260px;
      background: radial-gradient(circle, rgba(255,255,255,0.08) 0%, transparent 70%);
    }

    .pick-circle-wrap.winner::after {
      width: 340px;
      height: 340px;
      background: radial-gradient(circle, rgba(255,255,255,0.05) 0%, transparent 70%);
    }

    @keyframes winPulse {
      from { opacity: 0; transform: translate(-50%, -50%) scale(0.6); }
      to   { opacity: 1; transform: translate(-50%, -50%) scale(1); }
    }

    .result-circle {
      width: 180px;
      height: 180px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 8px 0 rgba(0,0,0,0.35);
    }

    .result-inner {
      width: 134px;
      height: 134px;
      border-radius: 50%;
      background: linear-gradient(to bottom, #e5e7f2, #d8dae8);
      box-shadow: inset 0 5px 0 rgba(0,0,0,0.2);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .result-inner img,
    .result-inner svg { width: 64px; height: 64px; }

    .house-placeholder {
      width: 180px;
      height: 180px;
      border-radius: 50%;
      background: rgba(0,0,0,0.25);
      animation: placeholderPulse 0.8s ease-in-out infinite alternate;
    }

    @keyframes placeholderPulse {
      from { background: rgba(0,0,0,0.2); }
      to   { background: rgba(0,0,0,0.35); }
    }

    .outcome-col {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
      min-width: 200px;
    }

    .outcome-text {
      color: white;
      font-size: clamp(2.5rem, 8vw, 3.5rem);
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      text-align: center;
    }

    .play-again-btn {
      background: white;
      color: var(--dark-text);
      border: 2px solid transparent;
      border-radius: 8px;
      padding: 0.9rem 3rem;
      font-family: 'Barlow Semi Condensed', sans-serif;
      font-size: 1rem;
      font-weight: 600;
      letter-spacing: 2px;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.2s, color 0.2s, border-color 0.2s;
    }

    .play-again-btn:hover {
      background: transparent;
      color: white;
      border-color: white;
    }

    /* Desktop layout for result - outcome in center */
    @media (min-width: 640px) {
      .picks-row {
        align-items: flex-start;
        gap: 3rem;
      }

      .pick-label {
        order: -1;
      }

      .result-with-center {
        display: grid;
        grid-template-columns: 1fr auto 1fr;
        align-items: center;
        gap: 2rem;
        width: 100%;
      }

      .pick-container:first-child { align-items: flex-end; }
      .pick-container:last-child  { align-items: flex-start; }
    }

    /* ─── RULES BUTTON ─── */
    .rules-btn {
      position: fixed;
      bottom: 2rem;
      right: 2rem;
      background: transparent;
      border: 2px solid rgba(255,255,255,0.6);
      color: white;
      font-family: 'Barlow Semi Condensed', sans-serif;
      font-size: 0.9rem;
      font-weight: 600;
      letter-spacing: 3px;
      text-transform: uppercase;
      padding: 0.6rem 2rem;
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s;
      z-index: 10;
    }

    .rules-btn:hover { background: white; color: var(--dark-text); border-color: white; }
    .rules-btn:focus-visible { outline: 2px solid white; outline-offset: 3px; }

    /* ─── MODE TOGGLE ─── */
    .mode-toggle {
      position: fixed;
      bottom: 2rem;
      left: 2rem;
      background: transparent;
      border: 2px solid rgba(255,255,255,0.4);
      color: rgba(255,255,255,0.7);
      font-family: 'Barlow Semi Condensed', sans-serif;
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 1px;
      text-transform: uppercase;
      padding: 0.6rem 1rem;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.2s;
      z-index: 10;
      max-width: 150px;
      line-height: 1.3;
    }
    .mode-toggle:hover { background: rgba(255,255,255,0.1); border-color: rgba(255,255,255,0.6); color: white; }

    /* ─── MODAL ─── */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 100;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }

    .modal-overlay.active { display: flex; }

    .modal {
      background: white;
      border-radius: 12px;
      padding: 2rem;
      max-width: 420px;
      width: 100%;
      position: relative;
      animation: modalIn 0.2s ease;
    }

    @keyframes modalIn {
      from { transform: scale(0.9); opacity: 0; }
      to   { transform: scale(1); opacity: 1; }
    }

    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 2rem;
    }

    .modal-title {
      color: var(--dark-text);
      font-size: 1.75rem;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    .modal-close {
      background: none;
      border: none;
      cursor: pointer;
      padding: 0.5rem;
      opacity: 0.3;
      transition: opacity 0.2s;
      line-height: 0;
    }

    .modal-close:hover { opacity: 0.7; }
    .modal-close:focus-visible { outline: 2px solid var(--dark-text); border-radius: 4px; }

    .modal-close svg { width: 20px; height: 20px; }

    .rules-image { width: 100%; height: auto; }

    /* ─── ANIMATIONS ─── */
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .choice-btn { animation: fadeInUp 0.35s ease both; }
    .choice-btn:nth-child(2) { animation-delay: 0s; }
    .choice-btn:nth-child(3) { animation-delay: 0.05s; }
    .choice-btn:nth-child(4) { animation-delay: 0.1s; }
    .choice-btn:nth-child(5) { animation-delay: 0.15s; }
    .choice-btn:nth-child(6) { animation-delay: 0.2s; }

    .result-circle { animation: fadeInUp 0.4s ease both; }

    /* ─── MOBILE ADJUSTMENTS ─── */
    @media (max-width: 500px) {
      .header { padding: 0.75rem 1rem; margin-bottom: 2rem; }
      .score-box { padding: 0.5rem 1.25rem; min-width: 90px; }

      .triangle-layout { width: 280px; height: 250px; }
      .triangle-layout .choice-btn:nth-child(2) { top: 0; left: 0; }
      .triangle-layout .choice-btn:nth-child(3) { top: 0; right: 0; }
      .triangle-layout .choice-btn:nth-child(4) { bottom: 0; left: 50%; transform: translateX(-50%); }
      .triangle-layout .bg-shape { width: 180px; }

      .choice-circle { width: 110px; height: 110px; }
      .choice-inner  { width: 80px;  height: 80px; }
      .choice-inner img, .choice-inner svg { width: 38px; height: 38px; }

      .pentagon-layout { width: 300px; height: 290px; }
      .pentagon-layout .choice-btn:nth-child(3) { top: 22%; left: -4px; }
      .pentagon-layout .choice-btn:nth-child(4) { bottom: 0; left: 8%; }
      .pentagon-layout .choice-btn:nth-child(5) { bottom: 0; right: 8%; }
      .pentagon-layout .choice-btn:nth-child(6) { top: 22%; right: -4px; }

      /* Mobile result: stacked */
      .result-with-center {
        flex-direction: column;
        gap: 1.5rem;
      }

      .picks-row {
        flex-direction: row;
        gap: 2rem;
        margin-bottom: 1.5rem;
      }

      .result-circle { width: 140px; height: 140px; }
      .result-inner  { width: 104px; height: 104px; }
      .result-inner img, .result-inner svg { width: 50px; height: 50px; }

      .house-placeholder { width: 140px; height: 140px; }

      .pick-label { font-size: 0.75rem; }

      .rules-btn { right: 50%; transform: translateX(50%); bottom: 1.5rem; }
      .mode-toggle { display: none; }
    }

    /* Score flash animation */
    @keyframes scoreFlash {
      0%   { transform: scale(1); }
      50%  { transform: scale(1.4); color: hsl(140, 60%, 50%); }
      100% { transform: scale(1); }
    }

    .score-value.flash { animation: scoreFlash 0.4s ease; }

    /* Ripple on win */
    .win-ripple {
      position: absolute;
      border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.15);
      animation: rippleOut 1.2s ease-out both;
      pointer-events: none;
    }

    @keyframes rippleOut {
      from { width: 180px; height: 180px; opacity: 1; }
      to   { width: 400px; height: 400px; opacity: 0; }
    }
  </style>
</head>
<body>

  <!-- Header -->
  <header class="header" id="header">
    <div class="logo" id="logoText">
      <span>ROCK</span>
      <span>PAPER</span>
      <span>SCISSORS</span>
    </div>
    <div class="score-box">
      <div class="score-label">Score</div>
      <div class="score-value" id="scoreVal">0</div>
    </div>
  </header>

  <!-- Main game -->
  <main class="game-area">

    <!-- Choice screen -->
    <div class="choice-screen" id="choiceScreen">
      <div class="triangle-layout triangle-rps" id="choiceLayout">
        <!-- BG shape -->
        <img class="bg-shape" id="bgShape" src="" alt="">
        <!-- Buttons injected by JS -->
      </div>
    </div>

    <!-- Result screen -->
    <div class="result-screen" id="resultScreen">
      <div class="result-with-center" id="resultLayout">
        <div class="pick-container" id="yourPick">
          <div class="pick-label">You Picked</div>
          <div class="pick-circle-wrap" id="yourCircleWrap">
            <div class="result-circle scissors" id="yourCircle">
              <div class="result-inner"><svg></svg></div>
            </div>
          </div>
        </div>

        <div class="outcome-col" id="outcomeCol">
          <div class="outcome-text" id="outcomeText"></div>
          <button class="play-again-btn" id="playAgainBtn">Play Again</button>
        </div>

        <div class="pick-container" id="housePick">
          <div class="pick-label">The House Picked</div>
          <div class="pick-circle-wrap" id="houseCircleWrap">
            <div class="house-placeholder" id="housePlaceholder"></div>
          </div>
        </div>
      </div>
    </div>

  </main>

  <!-- Rules button -->
  <button class="rules-btn" id="rulesBtn">Rules</button>

  <!-- Mode toggle -->
  <button class="mode-toggle" id="modeToggle">+ Lizard Spock</button>

  <!-- Rules modal -->
  <div class="modal-overlay" id="modalOverlay" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
    <div class="modal">
      <div class="modal-header">
        <h2 class="modal-title" id="modalTitle">Rules</h2>
        <button class="modal-close" id="modalClose" aria-label="Close rules">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 20 20">
            <path fill="#3B4262" fill-rule="evenodd" d="M16.97 0l2.122 2.121-7.425 7.425 7.425 7.425-2.121 2.12-7.425-7.424-7.425 7.425L0 16.97l7.425-7.425L0 2.121 2.121 0l7.425 7.425L16.971 0z" opacity=".25"/>
          </svg>
        </button>
      </div>
      <img class="rules-image" id="rulesImage" src="" alt="Game rules diagram">
    </div>
  </div>

  <script>
    // ─── SVG ICONS (inline) ───────────────────────────────────────────────────

    function renderMode() {
      const cfg = MODES[mode];
      // Logo
      logoText.innerHTML = cfg.logoLines.map(l => `<span>${l}</span>`).join('');
      // Mode toggle
      modeToggle.textContent = mode === 'rps' ? '+ Lizard Spock' : '− Lizard Spock';
      // Rules image
      rulesImage.src = mode === 'rps' ? RULES_SVG_RPS : buildBonusRulesImg();

    function renderChoiceButtons() {
      const cfg = MODES[mode];
      // Remove old buttons (keep bg-shape which is index 0)
      const oldBtns = choiceLayout.querySelectorAll('.choice-btn');
      oldBtns.forEach(b => b.remove());

      cfg.choices.forEach(choice => {
        const btn = document.createElement('button');
        btn.className = 'choice-btn';
        btn.setAttribute('aria-label', choice.charAt(0).toUpperCase() + choice.slice(1));
        btn.innerHTML = `
          <div class="choice-circle ${choice}">
            <div class="choice-inner">${ICONS[choice]}</div>
          </div>`;
        btn.addEventListener('click', () => handlePick(choice));
        choiceLayout.appendChild(btn);
      });
    }

    // ─── GAME LOGIC ───────────────────────────────────────────────────────────

      if (gameState !== 'picking') return;
      gameState = 'result';

      const cfg = MODES[mode];
      const choices = cfg.choices;
      const houseChoice = choices[Math.floor(Math.random() * choices.length)];

      let result;
      if (playerChoice === houseChoice) {
        result = 'draw';
      } else if (cfg.beats[playerChoice].includes(houseChoice)) {
        result = 'win';
      } else {
        result = 'lose';
      }

      showResultScreen(playerChoice, houseChoice, result);
    }

    function showResultScreen(playerChoice, houseChoice, result) {
      choiceScreen.style.display = 'none';
      resultScreen.classList.add('active');

      // Your circle
      yourCircle.className = `result-circle ${playerChoice}`;
      yourCircle.querySelector('.result-inner').innerHTML = ICONS[playerChoice];

      // House: animate reveal after delay
      houseCircleWrap.innerHTML = `<div class="house-placeholder" id="housePlaceholder"></div>`;
      yourCircleWrap.classList.remove('winner');
      houseCircleWrap.classList.remove('winner');

      // Outcome col - hide until house reveals
      outcomeText.textContent = '';
      playAgainBtn.style.display = 'none';

      setTimeout(() => {
        // Reveal house pick
        houseCircleWrap.innerHTML = `
          <div class="result-circle ${houseChoice}" style="animation: fadeInUp 0.4s ease both">
            <div class="result-inner">${ICONS[houseChoice]}</div>
          </div>`;

        // Show outcome
        setTimeout(() => {
          if (result === 'win') {
            outcomeText.textContent = 'YOU WIN';
            yourCircleWrap.classList.add('winner');
            score++;
          } else if (result === 'lose') {
            outcomeText.textContent = 'YOU LOSE';
            houseCircleWrap.classList.add('winner');
            if (score > 0) score--;
          } else {
            outcomeText.textContent = 'DRAW';
          }

          playAgainBtn.style.display = '';
          localStorage.setItem('rps_score', score);
          scoreVal.textContent = score;
          scoreVal.classList.add('flash');
          setTimeout(() => scoreVal.classList.remove('flash'), 400);
        }, 200);
      }, 1000);
    }

    function showChoiceScreen() {
      gameState = 'picking';
      resultScreen.classList.remove('active');
      choiceScreen.style.display = '';
      renderChoiceButtons();
    }

    // ─── EVENTS ───────────────────────────────────────────────────────────────
    playAgainBtn.addEventListener('click', showChoiceScreen);

    rulesBtn.addEventListener('click', () => {
      modalOverlay.classList.add('active');
    });

    modalClose.addEventListener('click', () => {
      modalOverlay.classList.remove('active');
    });

    modalOverlay.addEventListener('click', (e) => {
      if (e.target === modalOverlay) modalOverlay.classList.remove('active');
    });

    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') modalOverlay.classList.remove('active');
    });

    modeToggle.addEventListener('click', () => {
      mode = mode === 'rps' ? 'rpsls' : 'rps';
      localStorage.setItem('rps_mode', mode);
      renderMode();
      showChoiceScreen();
    });

    // ─── START ────────────────────────────────────────────────────────────────
    init();
  </script>
</body>
</html>
